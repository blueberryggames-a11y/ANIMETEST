<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANIMU — Stream Anime Free</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08080f;
    --surface: #0f0f1a;
    --card: #13131f;
    --border: #1e1e30;
    --accent: #e94560;
    --accent2: #7b2ff7;
    --gold: #f5a623;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --glow: 0 0 20px rgba(233,69,96,0.4);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(233,69,96,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(233,69,96,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* NAV */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(8,8,15,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 2rem;
    height: 60px;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    cursor: pointer;
    flex-shrink: 0;
  }
  .search-wrap {
    flex: 1;
    max-width: 500px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.5rem 1rem 0.5rem 2.5rem;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap .si {
    position: absolute;
    left: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1rem;
  }
  .search-results {
    position: absolute;
    top: calc(100% + 6px);
    left: 0; right: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    max-height: 400px;
    overflow-y: auto;
    z-index: 200;
    display: none;
  }
  .search-results.open { display: block; }
  .sr-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.6rem 1rem;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid var(--border);
  }
  .sr-item:last-child { border-bottom: none; }
  .sr-item:hover { background: var(--surface); }
  .sr-img { width: 36px; height: 50px; object-fit: cover; border-radius: 3px; flex-shrink: 0; background: var(--border); }
  .sr-info { min-width: 0; }
  .sr-title { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sr-meta { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

  .nav-links { display: flex; gap: 1.5rem; margin-left: auto; }
  .nav-links a { color: var(--muted); font-family: 'Rajdhani', sans-serif; font-weight: 500; text-decoration: none; font-size: 0.95rem; letter-spacing: 1px; transition: color 0.2s; cursor: pointer; }
  .nav-links a:hover, .nav-links a.active { color: var(--accent); }

  /* MAIN */
  main { position: relative; z-index: 1; }

  /* PLAYER VIEW */
  #player-view { display: none; padding: 1.5rem 2rem; }
  .player-layout { display: grid; grid-template-columns: 1fr 300px; gap: 1.5rem; max-width: 1400px; margin: 0 auto; }
  .player-main {}
  .player-frame-wrap {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: var(--glow);
  }
  .player-frame-wrap iframe { width: 100%; height: 100%; border: none; display: block; }
  .player-info { margin-top: 1rem; }
  .player-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 2px;
    line-height: 1;
  }
  .player-meta { display: flex; gap: 1rem; margin-top: 0.5rem; flex-wrap: wrap; align-items: center; }
  .badge {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 10px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--muted);
  }
  .badge.red { border-color: var(--accent); color: var(--accent); }
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1rem;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    padding: 0.4rem 1rem;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Episodes sidebar */
  .ep-sidebar { min-width: 0; }
  .ep-sidebar h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .ep-list { display: flex; flex-direction: column; gap: 4px; max-height: 70vh; overflow-y: auto; padding-right: 4px; }
  .ep-list::-webkit-scrollbar { width: 4px; }
  .ep-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .ep-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.6rem 1rem;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .ep-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ep-btn.active { background: rgba(233,69,96,0.15); border-color: var(--accent); color: var(--accent); }
  .ep-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; width: 30px; flex-shrink: 0; }

  /* BROWSE VIEW */
  #browse-view { padding: 2rem; max-width: 1400px; margin: 0 auto; }

  .section { margin-bottom: 3rem; }
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 1.25rem;
  }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 3px;
  }
  .section-title span { color: var(--accent); }
  .section-sub { font-size: 0.75rem; color: var(--muted); font-family: 'Rajdhani', sans-serif; letter-spacing: 2px; text-transform: uppercase; }

  .anime-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1rem;
  }

  .anime-card {
    cursor: pointer;
    border-radius: 8px;
    overflow: hidden;
    background: var(--card);
    border: 1px solid var(--border);
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .anime-card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 8px 24px rgba(233,69,96,0.2);
  }
  .card-img-wrap { position: relative; aspect-ratio: 2/3; overflow: hidden; }
  .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
  .anime-card:hover .card-img-wrap img { transform: scale(1.05); }
  .card-score {
    position: absolute;
    top: 6px; right: 6px;
    background: rgba(8,8,15,0.85);
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 0.75rem;
    padding: 1px 6px;
    border-radius: 3px;
  }
  .card-ep-badge {
    position: absolute;
    bottom: 6px; left: 6px;
    background: rgba(233,69,96,0.9);
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 3px;
    letter-spacing: 0.5px;
  }
  .card-info { padding: 0.6rem 0.75rem 0.75rem; }
  .card-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-genre {
    margin-top: 4px;
    font-size: 0.7rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* HERO */
  .hero {
    position: relative;
    height: 420px;
    overflow: hidden;
    margin-bottom: 2rem;
    display: flex;
    align-items: flex-end;
  }
  .hero-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center top;
    filter: blur(2px) brightness(0.35);
    transform: scale(1.05);
    transition: background-image 0.5s;
  }
  .hero-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, var(--bg) 10%, transparent 70%);
  }
  .hero-content {
    position: relative;
    z-index: 2;
    padding: 0 3rem 2.5rem;
    max-width: 700px;
  }
  .hero-eyebrow {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 5vw, 4rem);
    letter-spacing: 3px;
    line-height: 0.95;
    margin-bottom: 0.75rem;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
  }
  .hero-desc {
    font-size: 0.9rem;
    color: rgba(232,232,240,0.8);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 1.25rem;
  }
  .hero-actions { display: flex; gap: 0.75rem; }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 0.65rem 1.5rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .btn-primary:hover { background: #ff5a74; box-shadow: var(--glow); }
  .btn-secondary {
    background: rgba(255,255,255,0.1);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    padding: 0.65rem 1.25rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(4px);
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.18); }

  /* Loading */
  .skeleton {
    background: linear-gradient(90deg, var(--card) 25%, var(--surface) 50%, var(--card) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 6px;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .skel-card { border-radius: 8px; aspect-ratio: 2/3; }

  .loader { text-align: center; padding: 2rem; color: var(--muted); font-family: 'Rajdhani', sans-serif; }

  /* Filter tabs */
  .filter-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .ftab {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.3rem 0.9rem;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .ftab:hover, .ftab.active { border-color: var(--accent); color: var(--accent); background: rgba(233,69,96,0.08); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 768px) {
    nav { padding: 0 1rem; gap: 1rem; }
    .nav-links { display: none; }
    #browse-view { padding: 1rem; }
    .hero-content { padding: 0 1.5rem 2rem; }
    .player-layout { grid-template-columns: 1fr; }
    .ep-list { max-height: 200px; }
    #player-view { padding: 1rem; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo" onclick="showBrowse()">ANIMU</div>
  <div class="search-wrap">
    <span class="si">🔍</span>
    <input type="text" id="searchInput" placeholder="Search anime..." autocomplete="off">
    <div class="search-results" id="searchResults"></div>
  </div>
  <div class="nav-links">
    <a onclick="loadSection('trending')" class="active" id="nav-trending">TRENDING</a>
    <a onclick="loadSection('popular')" id="nav-popular">POPULAR</a>
    <a onclick="loadSection('top')" id="nav-top">TOP RATED</a>
  </div>
</nav>

<main>
  <!-- BROWSE VIEW -->
  <div id="browse-view">
    <!-- Hero -->
    <div class="hero" id="hero">
      <div class="hero-bg" id="heroBg"></div>
      <div class="hero-gradient"></div>
      <div class="hero-content">
        <div class="hero-eyebrow" id="heroEyebrow">⚡ TRENDING NOW</div>
        <div class="hero-title" id="heroTitle">Loading...</div>
        <div class="hero-desc" id="heroDesc"></div>
        <div class="hero-actions">
          <button class="btn-primary" id="heroPlayBtn" onclick="playHero()">▶ WATCH NOW</button>
          <button class="btn-secondary" id="heroInfoBtn" onclick="openHeroInfo()">ℹ MORE INFO</button>
        </div>
      </div>
    </div>

    <!-- Sections -->
    <div id="sections"></div>
  </div>

  <!-- PLAYER VIEW -->
  <div id="player-view">
    <button class="back-btn" onclick="showBrowse()">← Back</button>
    <div class="player-layout">
      <div class="player-main">
        <div class="player-frame-wrap">
          <iframe id="playerFrame" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>
        </div>
        <div class="player-info">
          <div class="player-meta" id="playerMeta"></div>
          <div class="player-title" id="playerTitle"></div>
          <div style="margin-top:0.5rem; font-size:0.85rem; color:var(--muted); line-height:1.6;" id="playerDesc"></div>
        </div>
      </div>
      <div class="ep-sidebar">
        <h3>EPISODES</h3>
        <div class="ep-list" id="epList"></div>
      </div>
    </div>
  </div>
</main>

<script>
// ─── AniList GraphQL ───────────────────────────────────────────────
const ANILIST = 'https://graphql.anilist.co';

async function gql(query, variables = {}) {
  const r = await fetch(ANILIST, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ query, variables })
  });
  const d = await r.json();
  return d.data;
}

const MEDIA_FIELDS = `
  id title { romaji english native }
  coverImage { large extraLarge }
  bannerImage
  description(asHtml: false)
  episodes averageScore genres status
  startDate { year }
  format
`;

async function getTrending(page = 1) {
  return gql(`query($page:Int){Page(page:$page,perPage:20){media(type:ANIME,sort:TRENDING_DESC,isAdult:false){${MEDIA_FIELDS}}}}`, { page });
}
async function getPopular(page = 1) {
  return gql(`query($page:Int){Page(page:$page,perPage:20){media(type:ANIME,sort:POPULARITY_DESC,isAdult:false){${MEDIA_FIELDS}}}}`, { page });
}
async function getTop(page = 1) {
  return gql(`query($page:Int){Page(page:$page,perPage:20){media(type:ANIME,sort:SCORE_DESC,isAdult:false,averageScore_greater:70){${MEDIA_FIELDS}}}}`, { page });
}
async function searchAnime(q) {
  return gql(`query($q:String){Page(perPage:8){media(type:ANIME,search:$q,isAdult:false){${MEDIA_FIELDS}}}}`, { q });
}

// ─── Embed URL ─────────────────────────────────────────────────────
function embedUrl(anilist_id, season = 1, episode = 1) {
  return `https://embed.filmu.in/anime/${anilist_id}/${season}/${episode}`;
}

// ─── State ─────────────────────────────────────────────────────────
let heroAnime = null;
let currentAnime = null;
let currentSeason = 1;
let currentEp = 1;

// ─── Hero ──────────────────────────────────────────────────────────
function setHero(anime) {
  heroAnime = anime;
  const title = anime.title.english || anime.title.romaji;
  document.getElementById('heroTitle').textContent = title;
  document.getElementById('heroDesc').textContent = stripHtml(anime.description || '');
  const bg = anime.bannerImage || anime.coverImage.extraLarge;
  if (bg) document.getElementById('heroBg').style.backgroundImage = `url(${bg})`;
}

function playHero() {
  if (heroAnime) openAnime(heroAnime);
}
function openHeroInfo() {
  if (heroAnime) openAnime(heroAnime);
}

// ─── Render card ───────────────────────────────────────────────────
function renderCard(anime) {
  const title = anime.title.english || anime.title.romaji;
  const score = anime.averageScore ? (anime.averageScore / 10).toFixed(1) : '';
  const genre = anime.genres ? anime.genres.slice(0, 2).join(' · ') : '';
  const eps = anime.episodes ? `${anime.episodes} EPS` : anime.status === 'RELEASING' ? 'ONGOING' : '';
  const img = anime.coverImage.large;

  const card = document.createElement('div');
  card.className = 'anime-card';
  card.innerHTML = `
    <div class="card-img-wrap">
      <img src="${img}" alt="${title}" loading="lazy" onerror="this.style.display='none'">
      ${score ? `<div class="card-score">★ ${score}</div>` : ''}
      ${eps ? `<div class="card-ep-badge">${eps}</div>` : ''}
    </div>
    <div class="card-info">
      <div class="card-title">${title}</div>
      ${genre ? `<div class="card-genre">${genre}</div>` : ''}
    </div>`;
  card.onclick = () => openAnime(anime);
  return card;
}

// ─── Sections ──────────────────────────────────────────────────────
let sectionsData = {};

async function loadSection(type) {
  // Update nav
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  const navEl = document.getElementById('nav-' + type);
  if (navEl) navEl.classList.add('active');

  const container = document.getElementById('sections');
  container.innerHTML = '<div class="loader">Loading anime...</div>';

  let data;
  if (type === 'trending') data = await getTrending();
  else if (type === 'popular') data = await getPopular();
  else data = await getTop();

  const list = data.Page.media;
  if (!heroAnime && list.length) setHero(list[0]);

  // Build two rows
  container.innerHTML = '';

  const genres = ['Action', 'Romance', 'Comedy', 'Fantasy', 'Sci-Fi', 'Horror'];
  const filtered = {};
  genres.forEach(g => {
    const items = list.filter(a => a.genres && a.genres.includes(g)).slice(0, 8);
    if (items.length >= 2) filtered[g] = items;
  });

  // Main row
  addSection(container, type === 'trending' ? '🔥 TRENDING' : type === 'popular' ? '💫 POPULAR' : '⭐ TOP RATED', list.slice(0, 12));

  // Genre rows
  Object.entries(filtered).slice(0, 3).forEach(([genre, items]) => {
    addSection(container, genre.toUpperCase(), items);
  });
}

function addSection(container, title, items) {
  const section = document.createElement('div');
  section.className = 'section';
  const [icon, ...rest] = title.split(' ');
  section.innerHTML = `
    <div class="section-header">
      <div class="section-title">${title}</div>
    </div>
    <div class="anime-grid" id="grid-${Math.random().toString(36).slice(2)}"></div>`;
  const grid = section.querySelector('.anime-grid');
  items.forEach(a => grid.appendChild(renderCard(a)));
  container.appendChild(section);
}

// ─── Player ────────────────────────────────────────────────────────
function openAnime(anime) {
  currentAnime = anime;
  currentSeason = 1;
  currentEp = 1;
  showPlayer();
  loadPlayer(1, 1);

  const title = anime.title.english || anime.title.romaji;
  document.getElementById('playerTitle').textContent = title;
  document.getElementById('playerDesc').textContent = stripHtml(anime.description || '').slice(0, 300) + '...';

  // Meta badges
  const meta = document.getElementById('playerMeta');
  meta.innerHTML = '';
  if (anime.averageScore) meta.innerHTML += `<span class="badge red">★ ${(anime.averageScore/10).toFixed(1)}</span>`;
  if (anime.startDate?.year) meta.innerHTML += `<span class="badge">${anime.startDate.year}</span>`;
  if (anime.format) meta.innerHTML += `<span class="badge">${anime.format}</span>`;
  if (anime.status) meta.innerHTML += `<span class="badge">${anime.status}</span>`;

  // Episodes
  buildEpList(anime);
}

function buildEpList(anime) {
  const epList = document.getElementById('epList');
  epList.innerHTML = '';
  const total = anime.episodes || 12;
  for (let i = 1; i <= total; i++) {
    const btn = document.createElement('button');
    btn.className = 'ep-btn' + (i === 1 ? ' active' : '');
    btn.id = `ep-${i}`;
    btn.innerHTML = `<span class="ep-num">${i}</span> Episode ${i}`;
    btn.onclick = () => selectEp(i);
    epList.appendChild(btn);
  }
}

function selectEp(ep) {
  document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById(`ep-${ep}`);
  if (btn) { btn.classList.add('active'); btn.scrollIntoView({ block: 'nearest' }); }
  currentEp = ep;
  loadPlayer(currentSeason, ep);
}

function loadPlayer(season, ep) {
  const url = embedUrl(currentAnime.id, season, ep);
  document.getElementById('playerFrame').src = url;
}

// ─── Views ─────────────────────────────────────────────────────────
function showBrowse() {
  document.getElementById('browse-view').style.display = 'block';
  document.getElementById('player-view').style.display = 'none';
  document.getElementById('playerFrame').src = '';
}

function showPlayer() {
  document.getElementById('browse-view').style.display = 'none';
  document.getElementById('player-view').style.display = 'block';
  window.scrollTo(0, 0);
}

// ─── Search ────────────────────────────────────────────────────────
let searchTimer;
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = searchInput.value.trim();
  if (q.length < 2) { searchResults.classList.remove('open'); return; }
  searchTimer = setTimeout(() => doSearch(q), 350);
});

searchInput.addEventListener('blur', () => setTimeout(() => searchResults.classList.remove('open'), 200));

async function doSearch(q) {
  searchResults.innerHTML = '<div class="sr-item"><span style="color:var(--muted);font-family:Rajdhani,sans-serif">Searching...</span></div>';
  searchResults.classList.add('open');
  const data = await searchAnime(q);
  const results = data.Page.media;
  if (!results.length) {
    searchResults.innerHTML = '<div class="sr-item"><span style="color:var(--muted);font-family:Rajdhani,sans-serif">No results found</span></div>';
    return;
  }
  searchResults.innerHTML = '';
  results.forEach(anime => {
    const title = anime.title.english || anime.title.romaji;
    const item = document.createElement('div');
    item.className = 'sr-item';
    item.innerHTML = `
      <img class="sr-img" src="${anime.coverImage.large}" alt="${title}" onerror="this.style.display='none'">
      <div class="sr-info">
        <div class="sr-title">${title}</div>
        <div class="sr-meta">${anime.startDate?.year || ''} ${anime.format ? '· ' + anime.format : ''} ${anime.episodes ? '· ' + anime.episodes + ' eps' : ''}</div>
      </div>`;
    item.onclick = () => {
      searchResults.classList.remove('open');
      searchInput.value = '';
      openAnime(anime);
    };
    searchResults.appendChild(item);
  });
}

// ─── Util ──────────────────────────────────────────────────────────
function stripHtml(html) {
  return html.replace(/<[^>]*>/g, '').replace(/&[^;]+;/g, ' ').trim();
}

// ─── Init ──────────────────────────────────────────────────────────
loadSection('trending');
</script>
