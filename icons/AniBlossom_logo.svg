<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb6d9"/>
      <stop offset="100%" stop-color="#14070d"/>
    </radialGradient>

    <linearGradient id="petal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff0f6"/>
      <stop offset="100%" stop-color="#ff5ea8"/>
    </linearGradient>

    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d9ff88"/>
      <stop offset="100%" stop-color="#4e8f2f"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- Leaves -->
  <ellipse cx="370" cy="610" rx="90" ry="40" fill="url(#leaf)" transform="rotate(-25 370 610)"/>
  <ellipse cx="650" cy="610" rx="90" ry="40" fill="url(#leaf)" transform="rotate(25 650 610)"/>

  <!-- Petals -->
  <ellipse cx="512" cy="330" rx="95" ry="180" fill="url(#petal)" filter="url(#glow)"/>
  <ellipse cx="355" cy="455" rx="95" ry="180" fill="url(#petal)" transform="rotate(-60 355 455)" filter="url(#glow)"/>
  <ellipse cx="669" cy="455" rx="95" ry="180" fill="url(#petal)" transform="rotate(60 669 455)" filter="url(#glow)"/>
  <ellipse cx="420" cy="625" rx="95" ry="180" fill="url(#petal)" transform="rotate(-125 420 625)" filter="url(#glow)"/>
  <ellipse cx="604" cy="625" rx="95" ry="180" fill="url(#petal)" transform="rotate(125 604 625)" filter="url(#glow)"/>

  <!-- Center -->
  <circle cx="512" cy="512" r="55" fill="#ff7eb6"/>

  <!-- Stamens -->
  <g stroke="#ffcb45" stroke-width="6" stroke-linecap="round">
    <line x1="512" y1="512" x2="512" y2="400"/>
    <line x1="512" y1="512" x2="455" y2="420"/>
    <line x1="512" y1="512" x2="569" y2="420"/>
    <line x1="512" y1="512" x2="430" y2="470"/>
    <line x1="512" y1="512" x2="594" y2="470"/>
  </g>

  <g fill="#ffd84d">
    <circle cx="512" cy="400" r="10"/>
    <circle cx="455" cy="420" r="10"/>
    <circle cx="569" cy="420" r="10"/>
    <circle cx="430" cy="470" r="10"/>
    <circle cx="594" cy="470" r="10"/>
  </g>

  <!-- Text -->
  <text x="512" y="900" text-anchor="middle"
        font-size="96" font-family="Poppins, Arial, sans-serif"
        fill="#ffd3e6" font-weight="bold">AniBlossom</text>
</svg>
