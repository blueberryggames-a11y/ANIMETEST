<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      max-width: 500px;
      padding: 20px;
    }

    h1 {
      font-size: 4rem;
      margin: 0;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.8;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 16px;
      background: #38bdf8;
      color: #0f172a;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    a:hover {
      background: #0ea5e9;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>404</h1>
    <p>Oops — the page you're looking for doesn’t exist.</p>
    <a href="/">Go Home</a>
  </div>
</body>
</html>
